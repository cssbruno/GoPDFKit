name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing semver tag to release, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache: true

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Ensure tag exists
        shell: bash
        run: git rev-parse -q --verify "refs/tags/${VERSION}"

      - name: Checkout release tag
        shell: bash
        run: git checkout --detach "refs/tags/${VERSION}"

      - name: Release check
        run: make release-check VERSION="${VERSION}"

      - name: Run generation benchmark budgets
        run: |
          make bench-generation-core-ci
          make bench-generation-core-budget

      - name: Install compliance dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y colord-data

      - name: Start Arlington checker
        env:
          ARLINGTON_DOCKER_IMAGE: verapdf/arlington:v1.30.1
        run: |
          docker run -d --rm --name gopdfkit-arlington -p 8080:8080 "$ARLINGTON_DOCKER_IMAGE"
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/profiles/ids >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs gopdfkit-arlington
          exit 1

      - name: Verify external compliance
        env:
          REQUIRE_COMPLIANCE_TOOLS: "1"
          SRGB_ICC: /usr/share/color/icc/colord/sRGB.icc
          VERAPDF_DOCKER_IMAGE: verapdf/cli:v1.30.2
          VERAPDF: tools/verapdf-docker.sh 0
          PDFUA_CHECKER: tools/verapdf-docker.sh ua2
          ARLINGTON_CHECKER: tools/arlington-validate.sh
          ARLINGTON_URL: http://localhost:8080
          ARLINGTON_PROFILE: arlington2.0
          ARLINGTON_REPORT_DIR: artifacts/compliance
        run: make compliance-validate compliance-baseline-check

      - name: Stop Arlington checker
        if: always()
        run: docker rm -f gopdfkit-arlington || true

      - name: Build release notes
        run: make release-notes VERSION="${VERSION}" > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release edit "${VERSION}" --title "${VERSION}" --notes-file release-notes.md
          else
            gh release create "${VERSION}" --title "${VERSION}" --notes-file release-notes.md
          fi
