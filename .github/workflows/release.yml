name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing semver tag to release, for example v0.1.0 or v0.1.0-rc.1
        required: true
        default: v0.1.0

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/go.mod
          cache: true

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Ensure tag exists
        shell: bash
        run: git rev-parse -q --verify "refs/tags/${VERSION}"

      - name: Checkout release tag
        shell: bash
        run: git checkout --detach "refs/tags/${VERSION}"

      - name: Verify release version and tests
        run: make release-version test VERSION="${VERSION}"

      - name: Install compliance dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y colord-data poppler-utils

      - name: Verify representative PDFs with Poppler
        run: make pdf-reader-smoke

      - name: Start Arlington checker
        env:
          ARLINGTON_DOCKER_IMAGE: verapdf/arlington@sha256:c6c8383ba5eea45047aeedfa3dd3532e7957b39ddcd40c9ebc4d20d4d884a3a8 # v1.30.1
        run: |
          docker run -d --rm --name gopdfkit-arlington -p 8080:8080 "$ARLINGTON_DOCKER_IMAGE"
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/profiles/ids >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs gopdfkit-arlington
          exit 1

      - name: Verify external compliance
        env:
          REQUIRE_COMPLIANCE_TOOLS: "1"
          SRGB_ICC: /usr/share/color/icc/colord/sRGB.icc
          VERAPDF_DOCKER_IMAGE: verapdf/cli@sha256:d5ee329657cf9bc4b2400392dd54c7d0a0ce9980ff6fa2da5590eebeec007cdb # v1.30.2
          VERAPDF: tools/verapdf-docker.sh 0
          PDFUA_CHECKER: tools/verapdf-docker.sh ua2
          ARLINGTON_CHECKER: tools/arlington-validate.sh
          ARLINGTON_URL: http://localhost:8080
          ARLINGTON_PROFILE: arlington2.0
          ARLINGTON_REPORT_DIR: artifacts/compliance
        run: make compliance-validate compliance-baseline-check

      - name: Stop Arlington checker
        if: always()
        run: docker rm -f gopdfkit-arlington || true

  release:
    name: Publish Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Ensure tag exists
        shell: bash
        run: git rev-parse -q --verify "refs/tags/${VERSION}"

      - name: Checkout release tag
        shell: bash
        run: git checkout --detach "refs/tags/${VERSION}"

      - name: Build release notes
        run: make release-notes VERSION="${VERSION}" > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_flags=()
          if [[ "${VERSION}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release edit "${VERSION}" --title "${VERSION}" --notes-file release-notes.md "${release_flags[@]}"
          else
            gh release create "${VERSION}" --title "${VERSION}" --notes-file release-notes.md "${release_flags[@]}"
          fi
