name: Fuzz

on:
  schedule:
    - cron: '17 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Hostile input boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/go.mod
          cache: true

      - name: Fuzz
        run: |
          go test ./document -run '^$' -fuzz '^FuzzDeserializeTemplate$' -fuzztime=10s
          go test ./document -run '^$' -fuzz '^FuzzSVGParse$' -fuzztime=10s
          go test ./importpdf -run '^$' -fuzz '^FuzzOpenBytes$' -fuzztime=10s
          go test ./pdfcdr -run '^$' -fuzz '^FuzzSanitizePDF$' -fuzztime=10s
          go test ./inspect -run '^$' -fuzz '^FuzzDecodedStreamsAndText$' -fuzztime=10s
          go test ./sign -run '^$' -fuzz '^FuzzVerifyCMS$' -fuzztime=10s
          go test ./sign -run '^$' -fuzz '^FuzzPDFSignatureScanner$' -fuzztime=10s
          go test ./sign -run '^$' -fuzz '^FuzzAnalyzePDF$' -fuzztime=10s
          go test ./internal/paperlang -run '^$' -fuzz '^FuzzIncrementalCSTMatchesCleanParse$' -fuzztime=10s
          go test ./internal/paperpkg -run '^$' -fuzz '^FuzzMigrateLockfile$' -fuzztime=10s

      - name: Upload fuzz crashers
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crashers
          path: |
            document/testdata/fuzz
            importpdf/testdata/fuzz
            pdfcdr/testdata/fuzz
            inspect/testdata/fuzz
            sign/testdata/fuzz
            internal/paperlang/testdata/fuzz
            internal/paperpkg/testdata/fuzz
          if-no-files-found: ignore
