name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache: true

      - name: Check
        run: make check

      - name: Check nested Go modules
        run: make modules

      - name: Check coverage floors
        run: make coverage-check

      - name: Static analysis
        run: make lint

      - name: Security analysis
        run: make gosec

      - name: Race test
        run: make race

      - name: Vulnerability check
        run: make govulncheck
