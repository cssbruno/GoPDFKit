name: Fuzz

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: ${{ matrix.package }} ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./document
            target: FuzzCompileHTML
          - package: ./document
            target: FuzzCompileHTMLRecovery
          - package: ./document
            target: FuzzCompileHTMLDataImageSource
          - package: ./document
            target: FuzzHTMLTokenize
          - package: ./document
            target: FuzzSVGParse
          - package: ./document
            target: FuzzDeserializeTemplate
          - package: ./document
            target: FuzzParseImageOptionsReader
          - package: ./document
            target: FuzzAppendEscapedPDFCellText
          - package: ./importpdf
            target: FuzzOpenBytes
          - package: ./inspect
            target: FuzzDecodedStreamsAndText
          - package: ./sign
            target: FuzzReadDER
          - package: ./sign
            target: FuzzInspectCMS
          - package: ./sign
            target: FuzzVerifyCMS
          - package: ./sign
            target: FuzzPDFString
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/go.mod
          cache: true

      - name: Fuzz
        run: go test ${{ matrix.package }} -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime=30s

      - name: Upload fuzz crashers
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-${{ matrix.target }}
          path: ${{ matrix.package }}/testdata/fuzz
          if-no-files-found: ignore
